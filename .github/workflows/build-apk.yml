name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 29 RC1
        run: |
          yes | sdkmanager --install "ndk;29.0.13113456" --channel=3 || true

      - name: Install CMake 3.22.1
        run: |
          yes | sdkmanager --install "cmake;3.22.1" || true

      - name: Download NCNN Android Vulkan prebuilt
        run: |
          NCNN_VERSION="20260113"
          curl -L -o ncnn-android-vulkan.zip "https://github.com/Tencent/ncnn/releases/download/${NCNN_VERSION}/ncnn-${NCNN_VERSION}-android-vulkan.zip"

      - name: Extract and install NCNN libraries
        run: |
          unzip -q ncnn-android-vulkan.zip -d ncnn-extracted
          NCNN_DIR=$(ls ncnn-extracted/ | head -1)
          NCNN_SRC="ncnn-extracted/$NCNN_DIR/arm64-v8a"
          NCNN_TARGET="app/src/main/cpp/ncnn"
          rm -rf "$NCNN_TARGET/include/ncnn"
          cp -r "$NCNN_SRC/include/ncnn" "$NCNN_TARGET/include/ncnn"
          mkdir -p "$NCNN_TARGET/lib"
          find "$NCNN_SRC" -name "*.a" -exec cp -v {} "$NCNN_TARGET/lib/" \;

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AimBuddy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AimBuddy-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
